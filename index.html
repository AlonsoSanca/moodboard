<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodboard — Sanca Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg: #f9f8f6;
  --surface: #ffffff;
  --surface-2: #f2f0ec;
  --border: rgba(0,0,0,0.10);
  --bw: 0.5px;
  --text: #1a1a1a;
  --text-2: #6b6b6b;
  --text-3: #9e9e9e;
  --accent: #1a1a1a;
  --accent-fg: #ffffff;
  --danger: #e53e3e;
  --r-sm: 8px;
  --r-md: 12px;
  --font-ui: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141413;
    --surface: #1e1e1c;
    --surface-2: #262624;
    --border: rgba(255,255,255,0.10);
    --text: #f0ede8;
    --text-2: #9e9b96;
    --text-3: #6b6866;
    --accent: #f0ede8;
    --accent-fg: #1a1a1a;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  }
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, textarea { font-family: inherit; color: inherit; background: none; border: none; outline: none; resize: none; }
a { color: inherit; text-decoration: none; }

/* ── APP SHELL ── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: var(--bw) solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(8px);
}
.header-logo { height: 28px; display: block; }
.header-logo-fallback {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  opacity: 0.75;
}
.header-sep { width: var(--bw); height: 20px; background: var(--border); }
.header-breadcrumb {
  font-size: 14px; font-weight: 500;
  color: var(--text-2); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-breadcrumb a { color: var(--text-2); }
.header-breadcrumb a:hover { color: var(--text); }
.header-breadcrumb .sep { margin: 0 6px; opacity: 0.4; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  transition: all 0.15s; white-space: nowrap;
  border: var(--bw) solid transparent;
}
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-primary:hover { opacity: 0.82; }
.btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-ghost { color: var(--text-2); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn i { font-size: 16px; }
.hidden { display: none !important; }

/* ── CONTENT ── */
.content { flex: 1; padding: 32px 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* ── HOME ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* project card */
.project-card {
  background: var(--surface);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden; cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.project-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.project-card-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: var(--surface-2); overflow: hidden;
}
.project-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.project-card-thumb-empty {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 28px;
}
.project-card-body { padding: 12px 14px 14px; }
.project-card-name {
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.project-card-meta {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); display: flex; gap: 10px;
}
.project-card-del {
  position: absolute; top: 8px; right: 8px;
  width: 28px; height: 28px; border-radius: 6px;
  background: rgba(0,0,0,0.55); color: #fff;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s; font-size: 14px;
  backdrop-filter: blur(4px);
}
.project-card:hover .project-card-del { opacity: 1; }
.project-card-del:hover { background: var(--danger); }

/* new project tile */
.new-project-tile {
  background: var(--surface);
  border: var(--bw) dashed var(--border);
  border-radius: var(--r-md);
  min-height: 140px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; cursor: pointer;
  transition: all 0.15s; color: var(--text-3);
}
.new-project-tile:hover { border-color: var(--text-2); color: var(--text-2); background: var(--surface-2); }
.new-project-tile i { font-size: 24px; }
.new-project-tile span { font-size: 13px; font-weight: 500; }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  z-index: 1000; display: flex;
  align-items: center; justify-content: center; padding: 24px;
}
.modal {
  background: var(--surface);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-md);
  padding: 24px; width: 100%; max-width: 400px;
  box-shadow: var(--shadow-md);
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-input {
  width: 100%; padding: 9px 12px;
  background: var(--surface-2);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-sm);
  font-size: 14px; color: var(--text);
  margin-bottom: 16px; transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--text-2); outline: none; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── BOARD ── */
.board-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  align-items: start;
}

/* ── MOODBOARD CARD ── */
.card {
  background: var(--surface);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
}

/* image strip */
.card-strip {
  position: relative; height: 200px;
  overflow-x: auto; overflow-y: hidden;
  display: flex; align-items: stretch;
  background: var(--surface-2);
  border-bottom: var(--bw) solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.card-strip::-webkit-scrollbar { height: 4px; }
.card-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.card-strip.drag-over {
  outline: 2px dashed var(--accent);
  outline-offset: -2px;
}

/* placeholder */
.strip-placeholder {
  width: 100%; min-width: 100%; height: 200px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: var(--text-3); cursor: pointer;
  transition: background 0.15s;
}
.strip-placeholder:hover { background: var(--surface-2); }
.strip-placeholder i { font-size: 22px; }
.strip-placeholder span { font-family: var(--font-mono); font-size: 11px; text-align: center; }

/* image item */
.img-item {
  position: relative; flex-shrink: 0; height: 200px;
}
.img-item img {
  height: 200px; width: auto; display: block;
  object-fit: contain; background: var(--surface-2);
}
.img-item-rm {
  position: absolute; top: 6px; right: 6px;
  width: 22px; height: 22px; border-radius: 4px;
  background: rgba(0,0,0,0.55); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; opacity: 0; transition: opacity 0.15s;
  cursor: pointer; backdrop-filter: blur(4px);
}
.img-item:hover .img-item-rm { opacity: 1; }
.img-item-rm:hover { background: var(--danger); }

/* add-more btn */
.strip-add-btn {
  flex-shrink: 0; width: 48px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: var(--bw) solid var(--border);
}
.strip-add-btn:hover { background: var(--surface-2); color: var(--text); }
.strip-add-btn i { font-size: 18px; }

/* card fields */
.card-fields {
  padding: 12px 14px;
  display: flex; flex-direction: column;
  gap: 10px; flex: 1;
}
.field-group { display: flex; flex-direction: column; gap: 2px; }
.field-label {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3);
}
.field-ta {
  font-size: 13px; line-height: 1.5; color: var(--text);
  border-bottom: var(--bw) solid var(--border);
  padding: 3px 0 4px; width: 100%;
  overflow: hidden; resize: none;
  min-height: 24px;
  transition: border-color 0.15s; background: transparent;
}
.field-ta:focus { border-bottom-color: var(--text-2); }
.field-ta::placeholder { color: var(--text-3); }
.field-ta-desc { min-height: 48px; }

/* card footer */
.card-footer {
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: var(--bw) solid var(--border);
  background: var(--surface-2);
}
.card-num { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.card-del {
  width: 24px; height: 24px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px; transition: all 0.15s;
}
.card-del:hover { background: #fee2e2; color: var(--danger); }
@media (prefers-color-scheme: dark) {
  .card-del:hover { background: rgba(229,62,62,0.15); }
}

/* loading overlay */
.loading-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.55);
  display: flex; align-items: center; justify-content: center; z-index: 5;
}
@media (prefers-color-scheme: dark) {
  .loading-overlay { background: rgba(0,0,0,0.4); }
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--text-2);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* empty state */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 80px 24px;
  color: var(--text-3); text-align: center;
}
.empty-state i { font-size: 40px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* toast */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent); color: var(--accent-fg);
  padding: 10px 18px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  z-index: 9999; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* export progress */
#export-progress {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
  z-index: 2000; display: flex;
  align-items: center; justify-content: center;
}
.export-box {
  background: var(--surface); border-radius: var(--r-md);
  padding: 32px 40px; text-align: center;
  box-shadow: var(--shadow-md); min-width: 240px;
}
.export-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.export-box p { font-size: 13px; color: var(--text-2); margin-top: 12px; }
.progress-track {
  width: 100%; height: 4px; background: var(--surface-2);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; width: 0%;
  transition: width 0.2s;
}

@media (max-width: 600px) {
  .content { padding: 20px 16px; }
  .header { padding: 0 16px; }
  .board-grid { grid-template-columns: 1fr; }
  .header-actions .btn-label { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <header class="header" id="header">
    <a href="?" id="home-link">
      <img src="./logo.png" class="header-logo" id="logo-img" alt="Sanca Films"
           onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
      <span class="header-logo-fallback hidden" id="logo-text">SANCA FILMS</span>
    </a>
    <div class="header-sep hidden" id="hdr-sep"></div>
    <div class="header-breadcrumb" id="hdr-crumb"></div>
    <div class="header-actions" id="hdr-actions"></div>
  </header>

  <main class="content hidden" id="home-screen">
    <div class="projects-grid" id="projects-grid"></div>
  </main>

  <main class="content hidden" id="board-screen">
    <div class="board-grid" id="board-grid"></div>
  </main>

  <!-- New project modal -->
  <div class="modal-backdrop hidden" id="proj-modal">
    <div class="modal" role="dialog" aria-modal="true">
      <h2 class="modal-title">New project</h2>
      <input type="text" class="modal-input" id="proj-name-input"
             placeholder="Project name…" maxlength="120" autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-create">Create</button>
      </div>
    </div>
  </div>

  <!-- PDF export overlay -->
  <div id="export-progress" class="hidden">
    <div class="export-box">
      <h3>Exporting PDF…</h3>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <p id="prog-label">Preparing…</p>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  ⚠️  PASTE YOUR SUPABASE CREDENTIALS HERE
// ══════════════════════════════════════════════════
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// ══════════════════════════════════════════════════

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── helpers ────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let toastTimer;
function toast(msg, ms = 3000) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',
    { month: 'short', day: 'numeric', year: 'numeric' });
}
function slugDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function autoGrow(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

const IMG_URL_RE = /cloudfront\.net|cloudinary\.com|imgix\.net|frameset\.app|shotdeck\.com/i;

// ─── state ───────────────────────────────────────
let curProjectId   = null;
let curProjectName = '';

// ─── routing ─────────────────────────────────────
function getQPid() {
  return new URLSearchParams(location.search).get('project');
}

function navToBoard(id, name) {
  history.pushState({}, '', `?project=${id}`);
  openBoard(id, name);
}

function navToHome() {
  history.pushState({}, '', location.pathname);
  openHome();
}

window.addEventListener('popstate', () => {
  const pid = getQPid();
  pid ? loadBoardData(pid) : openHome();
});

$('home-link').addEventListener('click', e => {
  e.preventDefault();
  navToHome();
});

// ─── screens ─────────────────────────────────────
function openHome() {
  curProjectId = null;
  curProjectName = '';
  $('home-screen').classList.remove('hidden');
  $('board-screen').classList.add('hidden');
  $('hdr-crumb').innerHTML = '';
  $('hdr-sep').classList.add('hidden');
  $('hdr-actions').innerHTML = '';
  loadProjects();
}

function openBoard(id, name) {
  curProjectId   = id;
  curProjectName = name;
  $('home-screen').classList.add('hidden');
  $('board-screen').classList.remove('hidden');
  $('hdr-sep').classList.remove('hidden');
  $('hdr-crumb').innerHTML =
    `<a href="?" id="bc-home">Projects</a><span class="sep">›</span>${esc(name)}`;
  $('bc-home')?.addEventListener('click', e => { e.preventDefault(); navToHome(); });
  $('hdr-actions').innerHTML = `
    <button class="btn btn-secondary" id="btn-pdf">
      <i class="ti ti-file-type-pdf"></i>
      <span class="btn-label">Export PDF</span>
    </button>
    <button class="btn btn-primary" id="btn-add">
      <i class="ti ti-plus"></i>
      <span class="btn-label">Add card</span>
    </button>
  `;
  $('btn-pdf').addEventListener('click', exportPDF);
  $('btn-add').addEventListener('click', addCard);
  loadBoardData(id);
}

// ─── home: load projects ──────────────────────────
async function loadProjects() {
  const grid = $('projects-grid');
  grid.innerHTML = '';

  const newTile = document.createElement('div');
  newTile.className = 'new-project-tile';
  newTile.innerHTML = `<i class="ti ti-plus"></i><span>New project</span>`;
  newTile.addEventListener('click', openProjModal);
  grid.appendChild(newTile);

  const { data: projects, error } = await sb
    .from('projects')
    .select('id, name, created_at')
    .order('created_at', { ascending: false });

  if (error) { toast('Failed to load projects'); return; }

  for (const p of projects) {
    const [{ count }, { data: thumb }] = await Promise.all([
      sb.from('cards')
        .select('*', { count: 'exact', head: true })
        .eq('project_id', p.id),
      sb.from('card_images')
        .select('image_url')
        .eq('project_id', p.id)
        .order('created_at', { ascending: true })
        .limit(1)
        .maybeSingle()
    ]);

    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="project-card-thumb">
        ${thumb
          ? `<img src="${esc(thumb.image_url)}" loading="lazy">`
          : `<div class="project-card-thumb-empty"><i class="ti ti-photo"></i></div>`}
      </div>
      <div class="project-card-body">
        <div class="project-card-name">${esc(p.name)}</div>
        <div class="project-card-meta">
          <span>${count ?? 0} card${count !== 1 ? 's' : ''}</span>
          <span>${fmtDate(p.created_at)}</span>
        </div>
      </div>
      <button class="project-card-del" title="Delete project"><i class="ti ti-trash"></i></button>
    `;
    card.querySelector('.project-card-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteProject(p.id, card);
    });
    card.addEventListener('click', () => navToBoard(p.id, p.name));
    grid.appendChild(card);
  }

  if (!projects.length) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.style.gridColumn = '1/-1';
    em.innerHTML = `<i class="ti ti-layout-board"></i><p>No projects yet.</p>`;
    grid.appendChild(em);
  }
}

async function deleteProject(id, el) {
  if (!confirm('Delete this project and all its data? This cannot be undone.')) return;
  el.style.opacity = '0.4'; el.style.pointerEvents = 'none';

  const { data: imgs } = await sb.from('card_images').select('image_url').eq('project_id', id);
  if (imgs?.length) {
    const paths = imgs.map(i => {
      try {
        const u = new URL(i.image_url);
        return decodeURIComponent(u.pathname.split('/object/public/card-images/')[1]);
      } catch { return null; }
    }).filter(Boolean);
    if (paths.length) await sb.storage.from('card-images').remove(paths);
  }
  await sb.from('card_images').delete().eq('project_id', id);
  await sb.from('cards').delete().eq('project_id', id);
  await sb.from('projects').delete().eq('id', id);
  el.remove();
  toast('Project deleted');
}

// ─── new project modal ────────────────────────────
function openProjModal() {
  $('proj-modal').classList.remove('hidden');
  $('proj-name-input').value = '';
  setTimeout(() => $('proj-name-input').focus(), 50);
}
$('modal-cancel').addEventListener('click', () => $('proj-modal').classList.add('hidden'));
$('proj-modal').addEventListener('click', e => {
  if (e.target === $('proj-modal')) $('proj-modal').classList.add('hidden');
});
$('proj-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
  if (e.key === 'Escape') $('proj-modal').classList.add('hidden');
});
$('modal-create').addEventListener('click', createProject);

async function createProject() {
  const name = $('proj-name-input').value.trim();
  if (!name) { $('proj-name-input').focus(); return; }
  $('modal-create').disabled = true;
  $('modal-create').textContent = 'Creating…';
  const { data, error } = await sb.from('projects').insert({ name }).select().single();
  $('modal-create').disabled = false;
  $('modal-create').textContent = 'Create';
  if (error) { toast('Failed to create project'); return; }
  $('proj-modal').classList.add('hidden');
  navToBoard(data.id, data.name);
}

// ─── board: load ──────────────────────────────────
async function loadBoardData(projectId) {
  const grid = $('board-grid');
  grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="spinner"></div></div>`;

  const { data: proj } = await sb.from('projects').select('name').eq('id', projectId).single();
  if (proj && proj.name !== curProjectName) {
    curProjectName = proj.name;
    curProjectId   = projectId;
    $('hdr-crumb').innerHTML =
      `<a href="?" id="bc-home">Projects</a><span class="sep">›</span>${esc(proj.name)}`;
    $('bc-home')?.addEventListener('click', e => { e.preventDefault(); navToHome(); });
  }

  const { data: cards, error } = await sb
    .from('cards')
    .select('*')
    .eq('project_id', projectId)
    .order('position', { ascending: true });

  if (error) { toast('Failed to load board'); return; }
  grid.innerHTML = '';

  if (!cards.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="ti ti-cards"></i><p>No cards yet. Hit "Add card".</p></div>`;
    return;
  }

  const imagesByCard = {};
  if (cards.length) {
    const { data: allImages } = await sb
      .from('card_images')
      .select('*')
      .in('card_id', cards.map(c => c.id))
      .order('position', { ascending: true });
    (allImages || []).forEach(img => {
      (imagesByCard[img.card_id] = imagesByCard[img.card_id] || []).push(img);
    });
  }

  cards.forEach((card, i) => {
    grid.appendChild(buildCard(card, imagesByCard[card.id] || [], i + 1));
  });

  grid.querySelectorAll('.field-ta').forEach(autoGrow);
}

// ─── build card element ───────────────────────────
function buildCard(card, images, num) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id  = card.id;
  el.dataset.num = num;

  // strip
  const strip = buildStrip(card.id, images);
  el.appendChild(strip);

  // fields
  const fields = document.createElement('div');
  fields.className = 'card-fields';

  const FIELD_DEFS = [
    { key: 'scene',       label: 'Scene',       ph: 'Scene name…',             cls: '' },
    { key: 'shot',        label: 'Shot type',   ph: 'e.g. Wide, MCU, ECU…',   cls: '' },
    { key: 'dialogue',    label: 'Dialogue',    ph: 'Key dialogue…',           cls: '' },
    { key: 'description', label: 'Description', ph: 'Notes, mood, lighting…',  cls: 'field-ta-desc' },
  ];

  FIELD_DEFS.forEach(({ key, label, ph, cls }) => {
    const grp = document.createElement('div');
    grp.className = 'field-group';
    grp.innerHTML = `
      <label class="field-label">${label}</label>
      <textarea class="field-ta ${cls}" placeholder="${ph}" rows="1">${esc(card[key])}</textarea>
    `;
    const ta = grp.querySelector('textarea');
    ta.addEventListener('input', () => autoGrow(ta));
    ta.addEventListener('change', () => {
      sb.from('cards').update({ [key]: ta.value }).eq('id', card.id);
    });
    fields.appendChild(grp);
  });

  el.appendChild(fields);

  // footer
  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.innerHTML = `
    <span class="card-num">#${num}</span>
    <button class="card-del" title="Delete card"><i class="ti ti-trash"></i></button>
  `;
  footer.querySelector('.card-del').addEventListener('click', () => deleteCard(card.id, el));
  el.appendChild(footer);

  return el;
}

// ─── image strip ─────────────────────────────────
function buildStrip(cardId, images) {
  const strip = document.createElement('div');
  strip.className = 'card-strip';
  strip.dataset.cardId = cardId;

  if (!images.length) {
    strip.appendChild(makePlaceholder(cardId, strip));
  } else {
    images.forEach(img => strip.appendChild(makeImgItem(img, cardId, strip)));
    strip.appendChild(makeAddBtn(cardId, strip));
  }

  setupDropZone(strip, cardId);
  return strip;
}

function makePlaceholder(cardId, strip) {
  const ph = document.createElement('div');
  ph.className = 'strip-placeholder';
  ph.innerHTML = `<i class="ti ti-photo-plus"></i><span>drag &amp; drop · click · paste</span>`;
  ph.addEventListener('click', () => openPicker(cardId, strip));
  return ph;
}

function makeImgItem(imgRow, cardId, strip) {
  const wrap = document.createElement('div');
  wrap.className = 'img-item';
  wrap.dataset.imgId = imgRow.id;
  const img = document.createElement('img');
  img.src = imgRow.image_url;
  img.loading = 'lazy';
  const rm = document.createElement('button');
  rm.className = 'img-item-rm';
  rm.title = 'Remove image';
  rm.innerHTML = '<i class="ti ti-x"></i>';
  rm.addEventListener('click', e => { e.stopPropagation(); removeImage(imgRow, wrap, strip, cardId); });
  wrap.appendChild(img);
  wrap.appendChild(rm);
  return wrap;
}

function makeAddBtn(cardId, strip) {
  const btn = document.createElement('button');
  btn.className = 'strip-add-btn';
  btn.title = 'Add image';
  btn.innerHTML = '<i class="ti ti-plus"></i>';
  btn.addEventListener('click', () => openPicker(cardId, strip));
  return btn;
}

async function removeImage(imgRow, wrapEl, strip, cardId) {
  wrapEl.style.opacity = '0.4';
  try {
    const u = new URL(imgRow.image_url);
    const path = decodeURIComponent(u.pathname.split('/object/public/card-images/')[1]);
    if (path) await sb.storage.from('card-images').remove([path]);
  } catch (_) {}
  await sb.from('card_images').delete().eq('id', imgRow.id);
  wrapEl.remove();
  const hasImg = strip.querySelector('.img-item');
  if (!hasImg) {
    strip.querySelector('.strip-add-btn')?.remove();
    strip.appendChild(makePlaceholder(cardId, strip));
  }
}

// ─── file picker ─────────────────────────────────
function openPicker(cardId, strip) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.addEventListener('change', async () => {
    for (const f of inp.files) await uploadFile(f, cardId, strip);
  });
  inp.click();
}

// ─── drag & drop ─────────────────────────────────
function setupDropZone(strip, cardId) {
  let n = 0;
  strip.addEventListener('dragenter', e => {
    e.preventDefault(); n++;
    strip.classList.add('drag-over');
  });
  strip.addEventListener('dragleave', () => {
    if (--n <= 0) { n = 0; strip.classList.remove('drag-over'); }
  });
  strip.addEventListener('dragover', e => e.preventDefault());
  strip.addEventListener('drop', async e => {
    e.preventDefault(); n = 0; strip.classList.remove('drag-over');
    const files = [...(e.dataTransfer.files || [])].filter(f => f.type.startsWith('image/'));
    for (const f of files) await uploadFile(f, cardId, strip);
  });
}

// ─── paste ───────────────────────────────────────
document.addEventListener('paste', async e => {
  // find the strip nearest to the hovered or focused element
  const strip =
    document.querySelector('.card-strip:hover') ||
    document.activeElement?.closest('.card')?.querySelector('.card-strip');
  if (!strip) return;
  const cardId = strip.dataset.cardId;
  if (!cardId) return;

  const items = [...(e.clipboardData.items || [])];
  const imgItem = items.find(i => i.type.startsWith('image/'));
  if (imgItem) {
    const file = imgItem.getAsFile();
    if (file) { await uploadFile(file, cardId, strip); return; }
  }
  const textItem = items.find(i => i.type === 'text/plain');
  if (textItem) {
    textItem.getAsString(async url => {
      url = url.trim();
      if (IMG_URL_RE.test(url) || /^https?:\/\/.+\.(png|jpe?g|gif|webp|avif)/i.test(url)) {
        await uploadFromUrl(url, cardId, strip);
      }
    });
  }
});

// ─── upload helpers ───────────────────────────────
async function uploadFile(file, cardId, strip) {
  const isGif = file.type === 'image/gif';
  const ext   = isGif ? 'gif' : 'webp';
  const path  = `${curProjectId}/${cardId}-${Date.now()}.${ext}`;

  setStripLoading(strip, true);

  const blob = isGif ? file : await toWebp(file);
  const { error: upErr } = await sb.storage
    .from('card-images')
    .upload(path, blob, { contentType: isGif ? 'image/gif' : 'image/webp', upsert: false });

  if (upErr) { toast('Upload failed'); console.error(upErr); setStripLoading(strip, false); return; }

  const { data: { publicUrl } } = sb.storage.from('card-images').getPublicUrl(path);
  const { count } = await sb.from('card_images')
    .select('*', { count: 'exact', head: true })
    .eq('card_id', cardId);

  const { data: imgRow, error: dbErr } = await sb.from('card_images').insert({
    card_id:    cardId,
    project_id: curProjectId,
    position:   count ?? 0,
    image_url:  publicUrl,
  }).select().single();

  setStripLoading(strip, false);
  if (dbErr) { toast('DB error'); console.error(dbErr); return; }
  appendToStrip(imgRow, cardId, strip);
}

async function uploadFromUrl(url, cardId, strip) {
  setStripLoading(strip, true);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const blob = await res.blob();
    setStripLoading(strip, false);
    await uploadFile(new File([blob], 'image', { type: blob.type || 'image/webp' }), cardId, strip);
  } catch (err) {
    setStripLoading(strip, false);
    toast('Could not fetch that URL');
    console.error(err);
  }
}

async function toWebp(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      c.toBlob(resolve, 'image/webp', 0.92);
    };
    img.src = url;
  });
}

function appendToStrip(imgRow, cardId, strip) {
  strip.querySelector('.strip-placeholder')?.remove();
  const addBtn = strip.querySelector('.strip-add-btn');
  if (addBtn) addBtn.remove();
  strip.appendChild(makeImgItem(imgRow, cardId, strip));
  strip.appendChild(makeAddBtn(cardId, strip));
  strip.scrollLeft = strip.scrollWidth;
}

function setStripLoading(strip, show) {
  let ov = strip.querySelector('.loading-overlay');
  if (show && !ov) {
    ov = document.createElement('div');
    ov.className = 'loading-overlay';
    ov.innerHTML = '<div class="spinner"></div>';
    strip.appendChild(ov);
  } else if (!show && ov) ov.remove();
}

// ─── add / delete card ────────────────────────────
async function addCard() {
  const grid = $('board-grid');
  const pos  = grid.querySelectorAll('.card').length;

  const { data: card, error } = await sb.from('cards').insert({
    project_id: curProjectId,
    position: pos,
    scene: '', shot: '', dialogue: '', description: '',
  }).select().single();

  if (error) { toast('Failed to add card'); return; }
  grid.querySelector('.empty-state')?.remove();
  const el = buildCard(card, [], pos + 1);
  grid.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function deleteCard(cardId, el) {
  if (!confirm('Delete this card?')) return;
  el.style.opacity = '0.4'; el.style.pointerEvents = 'none';

  const { data: imgs } = await sb.from('card_images').select('image_url').eq('card_id', cardId);
  if (imgs?.length) {
    const paths = imgs.map(i => {
      try {
        const u = new URL(i.image_url);
        return decodeURIComponent(u.pathname.split('/object/public/card-images/')[1]);
      } catch { return null; }
    }).filter(Boolean);
    if (paths.length) await sb.storage.from('card-images').remove(paths);
  }
  await sb.from('card_images').delete().eq('card_id', cardId);
  await sb.from('cards').delete().eq('id', cardId);
  el.remove();

  $('board-grid').querySelectorAll('.card').forEach((c, i) => {
    c.querySelector('.card-num').textContent = `#${i + 1}`;
    c.dataset.num = i + 1;
  });

  if (!$('board-grid').querySelector('.card')) {
    $('board-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="ti ti-cards"></i><p>No cards yet. Hit "Add card".</p></div>`;
  }
}

// ─── PDF export ───────────────────────────────────
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const cards = [...$('board-grid').querySelectorAll('.card')];
  if (!cards.length) { toast('No cards to export'); return; }

  $('export-progress').classList.remove('hidden');
  const fill  = $('prog-fill');
  const label = $('prog-label');

  // fetch all card data in one query
  const cardIds = cards.map(c => c.dataset.id);
  const { data: cardRows } = await sb.from('cards').select('*').in('id', cardIds);
  const { data: allImgs  } = await sb.from('card_images').select('*').in('card_id', cardIds)
    .order('position', { ascending: true });

  const cardMap = Object.fromEntries((cardRows || []).map(c => [c.id, c]));
  const imgMap  = {};
  (allImgs || []).forEach(i => (imgMap[i.card_id] = imgMap[i.card_id] || []).push(i));

  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, M = 16, UW = PW - M * 2;

  for (let i = 0; i < cards.length; i++) {
    const cid  = cards[i].dataset.id;
    const cnum = cards[i].dataset.num;
    label.textContent = `Card ${i + 1} of ${cards.length}`;
    fill.style.width  = `${(i / cards.length) * 100}%`;
    if (i > 0) pdf.addPage();

    let y = M;
    const cardImgs = imgMap[cid] || [];

    if (cardImgs.length) {
      const MAX_H = 70;
      let x = M;
      const rendered = [];

      for (const ci of cardImgs) {
        const dataUrl = await imgToDataUrl(ci.image_url);
        if (!dataUrl) continue;
        const { w: nw, h: nh } = await imgDims(dataUrl);
        const h = MAX_H;
        const w = h * (nw / nh);
        if (x + w > PW - M + 1) break;
        rendered.push({ dataUrl, x, y: y, w, h });
        x += w + 3;
      }

      rendered.forEach(({ dataUrl, x, y, w, h }) => {
        pdf.addImage(dataUrl, 'JPEG', x, y, w, h);
      });
      y += MAX_H + 8;
    }

    const row = cardMap[cid] || {};
    const FIELDS = [
      { label: 'SCENE',       key: 'scene' },
      { label: 'SHOT TYPE',   key: 'shot' },
      { label: 'DIALOGUE',    key: 'dialogue' },
      { label: 'DESCRIPTION', key: 'description' },
    ];
    for (const f of FIELDS) {
      const val = row[f.key] || '';
      if (!val) continue;
      pdf.setFontSize(7); pdf.setTextColor(160, 155, 148);
      pdf.text(f.label, M, y); y += 4;
      pdf.setFontSize(11); pdf.setTextColor(28, 28, 26);
      const lines = pdf.splitTextToSize(val, UW);
      pdf.text(lines, M, y); y += lines.length * 5.5 + 5;
      if (y > PH - M - 12) break;
    }

    pdf.setFontSize(8); pdf.setTextColor(180, 175, 168);
    pdf.text(`Card #${cnum}`, M, PH - M);
    pdf.text(curProjectName, PW / 2, PH - M, { align: 'center' });
  }

  fill.style.width = '100%';
  label.textContent = 'Saving…';
  await new Promise(r => setTimeout(r, 250));

  const fname = `${curProjectName.replace(/\s+/g,'-').toLowerCase()}-${slugDate()}.pdf`;
  pdf.save(fname);
  $('export-progress').classList.add('hidden');
  fill.style.width = '0%';
  toast('PDF exported!');
}

async function imgToDataUrl(url) {
  try {
    const res  = await fetch(url);
    const blob = await res.blob();
    return await new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => {
        if (blob.type === 'image/gif') { resolve(r.result); return; }
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          resolve(c.toDataURL('image/jpeg', 0.88));
        };
        img.src = r.result;
      };
      r.readAsDataURL(blob);
    });
  } catch { return null; }
}

function imgDims(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
    img.onerror = () => resolve({ w: 1, h: 1 });
    img.src = dataUrl;
  });
}

// ─── boot ─────────────────────────────────────────
(async function boot() {
  const pid = getQPid();
  if (pid) {
    const { data: proj } = await sb.from('projects').select('name').eq('id', pid).single();
    if (proj) { openBoard(pid, proj.name); return; }
  }
  openHome();
})();
